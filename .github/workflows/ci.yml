name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_THRESHOLD_WORKSPACE: "80"
  COVERAGE_THRESHOLD_ROTEL_CLI: "75"
  COVERAGE_THRESHOLD_ROTEL_CORE: "85"
  COVERAGE_THRESHOLD_ROTEL_DASHBOARD: "70"
  COVERAGE_THRESHOLD_ROTEL_RECEIVER: "80"
  COVERAGE_THRESHOLD_ROTEL_STORAGE: "85"
  COVERAGE_THRESHOLD_ROTEL_TUI: "70"

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Lint (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build
        run: cargo build --workspace --all-features --verbose

      - name: Run unit tests
        run: cargo nextest run --workspace --lib --all-features

      - name: Run integration tests
        run: cargo nextest run --workspace --test '*' --all-features

      - name: Run doc tests
        run: cargo test --workspace --doc --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      workspace_coverage: ${{ steps.coverage.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install coverage tooling
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate workspace LCOV report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Generate coverage JSON summary
        run: cargo llvm-cov --workspace --all-features --json --output-path coverage.json --summary-only

      - name: Enforce workspace and crate thresholds
        id: coverage
        run: python3 .github/scripts/check_coverage.py coverage.json
        env:
          COVERAGE_THRESHOLD_WORKSPACE: ${{ env.COVERAGE_THRESHOLD_WORKSPACE }}
          COVERAGE_THRESHOLD_ROTEL_CLI: ${{ env.COVERAGE_THRESHOLD_ROTEL_CLI }}
          COVERAGE_THRESHOLD_ROTEL_CORE: ${{ env.COVERAGE_THRESHOLD_ROTEL_CORE }}
          COVERAGE_THRESHOLD_ROTEL_DASHBOARD: ${{ env.COVERAGE_THRESHOLD_ROTEL_DASHBOARD }}
          COVERAGE_THRESHOLD_ROTEL_RECEIVER: ${{ env.COVERAGE_THRESHOLD_ROTEL_RECEIVER }}
          COVERAGE_THRESHOLD_ROTEL_STORAGE: ${{ env.COVERAGE_THRESHOLD_ROTEL_STORAGE }}
          COVERAGE_THRESHOLD_ROTEL_TUI: ${{ env.COVERAGE_THRESHOLD_ROTEL_TUI }}

      - name: Upload coverage JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage.json

      - name: Upload coverage HTML artifact
        run: cargo llvm-cov --workspace --all-features --html

      - name: Store coverage trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: target/llvm-cov/html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          verbose: true

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## Coverage report
            - Workspace line coverage: **${{ steps.coverage.outputs.workspace }}%**
            - Minimum workspace threshold: **${{ env.COVERAGE_THRESHOLD_WORKSPACE }}%**
            - Per-crate thresholds enforced in CI:
              - `otelite-cli`: `${{ env.COVERAGE_THRESHOLD_ROTEL_CLI }}%`
              - `otelite-core`: `${{ env.COVERAGE_THRESHOLD_ROTEL_CORE }}%`
              - `otelite-dashboard`: `${{ env.COVERAGE_THRESHOLD_ROTEL_DASHBOARD }}%`
              - `otelite-receiver`: `${{ env.COVERAGE_THRESHOLD_ROTEL_RECEIVER }}%`
              - `otelite-storage`: `${{ env.COVERAGE_THRESHOLD_ROTEL_STORAGE }}%`
              - `otelite-tui`: `${{ env.COVERAGE_THRESHOLD_ROTEL_TUI }}%`
            - Detailed HTML and JSON reports are available in the workflow artifacts and in Codecov trends.

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: cargo audit

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-outdated
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-outdated

      - name: Check for outdated dependencies
        run: cargo outdated --exit-code 1 || true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items

      - name: Check for broken links
        run: |
          cargo install cargo-deadlinks || true
          cargo deadlinks --check-http || true

  ci-success:
    name: CI Success
    needs: [format, lint, test, coverage, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed"
