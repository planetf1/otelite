name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Secret detection with gitleaks
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comprehensive scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for Gitleaks Pro
        with:
          # Scan all commits in the repository
          args: --verbose --redact

  # Dependency vulnerability scanning
  cargo-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  # Dependency license checking
  cargo-deny:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check licenses
        run: cargo deny check licenses

  # Security advisory check
  cargo-advisories:
    name: Security Advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Check advisories
        run: cargo audit --deny warnings

  # SAST (Static Application Security Testing) with Semgrep
  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  # Final status check
  security-success:
    name: Security Success
    needs: [gitleaks, cargo-audit, cargo-deny, cargo-advisories, semgrep]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.gitleaks.result }}" != "success" ]] || \
             [[ "${{ needs.cargo-audit.result }}" != "success" ]] || \
             [[ "${{ needs.cargo-deny.result }}" != "success" ]] || \
             [[ "${{ needs.cargo-advisories.result }}" != "success" ]] || \
             [[ "${{ needs.semgrep.result }}" != "success" ]]; then
            echo "❌ One or more security checks failed"
            exit 1
          fi
          echo "✅ All security checks passed"

# Made with Bob
