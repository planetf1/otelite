name: Release

# Bumps version, creates a tag, and dispatches publish.yml.
#
# Triggers:
#   - Every push to main bumps a patch version automatically.
#   - Manual dispatch: Actions → Release → Run workflow (patch/minor/major).
#     CLI: gh workflow run release.yml --field bump=patch
#
# The skip condition on the job prevents the version-bump commit itself
# from re-triggering this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Guard: the version-bump commit must not re-trigger this workflow.
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in Cargo.toml
        id: bump
        env:
          BUMP_KIND: ${{ inputs.bump || 'patch' }}
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "$BUMP_KIND" in
            major) new="$((major+1)).0.0" ;;
            minor) new="$major.$((minor+1)).0" ;;
            patch) new="$major.$minor.$((patch+1))" ;;
          esac
          sed -i "s/^version = \"$current\"/version = \"$new\"/" Cargo.toml
          echo "old=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Update Cargo.lock
        run: cargo metadata --format-version 1 > /dev/null

      - name: Commit, tag, and push
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main "v${{ steps.bump.outputs.new }}"

      - name: Summary
        run: |
          echo "### Released v${{ steps.bump.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Bumped \`${{ steps.bump.outputs.old }}\` → \`${{ steps.bump.outputs.new }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`v${{ steps.bump.outputs.new }}\` pushed — publish workflow triggered." >> "$GITHUB_STEP_SUMMARY"
